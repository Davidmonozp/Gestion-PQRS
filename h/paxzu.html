<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <section class="speaker-hero">
  <div class="background-container">
    <img src="assets/images/background-event.jpg" alt="Fondo" class="bg-image">
    <div class="overlay"></div>
  </div>

  <div class="container content-grid">
    <div class="speaker-image-wrapper">
      <img src="assets/images/andres-otero.png" alt="Andrés Otero Leongómez" class="speaker-img">
      <div class="dot dot-blue"></div>
      <div class="dot dot-purple"></div>
    </div>

    <div class="info-card">
      <h1 class="speaker-name">ANDRÉS <br> OTERO <br> LEONGÓMEZ</h1>
      <p class="speaker-specialty">Manejo de crisis</p>
      
      <blockquote class="quote">
        <p>En un mundo empresarial dinámico y cambiante, las crisis son inevitables</p>
      </blockquote>

      <p class="description">
        Desde su perspectiva como investigador privado en algunos de los casos más complejos en Colombia...
      </p>

      <button class="btn-cta-light">Call to action</button>
    </div>
  </div>

  <div class="side-contact">
    <span>Contacto</span>
    <i class="fa fa-envelope"></i>
  </div>
</section>
</body>
</html>
